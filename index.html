<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looké et Responsable - Cycle de vie d'un jean</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            text-align: center;
            padding: 15px;
            background-color: white;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 24px;
        }
        h2 {
            color: #7f8c8d;
            margin: 5px 0 0;
            font-size: 18px;
        }
        .instruction {
            font-size: 14px;
            color: #555;
            margin: 10px auto;
            max-width: 600px;
            text-align: center;
        }
        .game-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            flex: 1;
        }
        .steps-column {
            width: 150px;
            background-color: #f0f0f0;
            padding: 10px;
            position: fixed;
            height: calc(100vh - 160px);
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .steps-column h3 {
            font-size: 14px;
            text-align: center;
            margin: 5px 0 10px;
            color: #2c3e50;
        }
        .steps-column p {
            font-size: 12px;
            text-align: center;
            margin: 0 0 10px;
            color: #7f8c8d;
        }
        .step {
            padding: 8px;
            border-radius: 5px;
            margin: 5px 0;
            cursor: move;
            user-select: none;
            text-align: center;
            font-size: 12px;
            color: white;
        }
        .step-color-1 { background-color: #e74c3c; }
        .step-color-2 { background-color: #8e44ad; }
        .step-color-3 { background-color: #f39c12; }
        .step-color-4 { background-color: #27ae60; }
        .step-color-5 { background-color: #3498db; }
        .step-color-6 { background-color: #95a5a6; }

        .step:hover {
            opacity: 0.9;
        }
        .drop-zone-container {
            margin-left: 160px;
            padding: 10px;
            width: calc(100% - 160px);
            overflow-y: auto;
            height: calc(100vh - 160px);
        }
        .drop-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .drop-slot {
            border: 2px dashed #bdc3c7;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            min-height: 40px;
            background-color: #ecf0f1;
            font-size: 14px;
        }
        .drop-slot.highlight {
            background-color: #d6eaf8;
            border-color: #3498db;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin: 15px auto;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:hover {
            background-color: #c0392b;
        }
        .feedback {
            margin: 15px auto;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            display: none;
        }
        .correct {
            background-color: #d4edda;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
        }
        .hint-box {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 5px;
            margin: 10px auto;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }
            .steps-column {
                width: 100%;
                position: relative;
                height: auto;
            }
            .drop-zone-container {
                margin-left: 0;
                width: 100%;
            }
            .step {
                font-size: 10px;
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Looké et Responsable</h1>
        <h2>Cycle de vie d'un jean</h2>
        <p class="instruction">
            Remettez dans l'ordre les étapes de la vie d'un jean pour prendre conscience que toutes utilisent des ressources énergétiques.<br>
            <strong>Indice : l'achat est la 18ème étape.</strong>
        </p>
    </div>

    <div class="game-container">
        <div class="steps-column" id="steps-column">
            <h3>Étapes</h3>
            <p>Inspiré par<br>Ma Petite Planète</p>
            <div id="steps-container">
                <!-- Les étapes seront insérées ici par JavaScript -->
            </div>
        </div>

        <div class="drop-zone-container">
            <div class="drop-zone" id="drop-zone">
                <!-- Les emplacements numérotés seront insérés ici par JavaScript -->
            </div>

            <button id="check-order">Vérifier l'ordre</button>
            <div class="feedback" id="feedback"></div>
            <div class="hint-box" id="hint-box"></div>
        </div>
    </div>

    <script>
        // Liste des étapes avec leur numéro et leur couleur associée
        const steps = [
            { id: 1, text: "Plantation du coton", colorClass: "step-color-1" },
            { id: 2, text: "Irrigation, utilisation d’engrais", colorClass: "step-color-1" },
            { id: 3, text: "Récoltes du coton", colorClass: "step-color-1" },
            { id: 4, text: "Transport du coton vers une usine", colorClass: "step-color-6" },
            { id: 5, text: "Nettoyage du coton", colorClass: "step-color-2" },
            { id: 6, text: "Séparation des fibres", colorClass: "step-color-2" },
            { id: 7, text: "Cadrage, filage, tissage, teinture", colorClass: "step-color-2" },
            { id: 8, text: "Fixation de la couleur (traitement chimique)", colorClass: "step-color-2" },
            { id: 9, text: "Séchage du tissu", colorClass: "step-color-2" },
            { id: 10, text: "Transport vers usines de confection", colorClass: "step-color-6" },
            { id: 11, text: "Découpage du tissu", colorClass: "step-color-3" },
            { id: 12, text: "Assemblage et couture", colorClass: "step-color-3" },
            { id: 13, text: "Pose des boutons, fermetures éclairs...", colorClass: "step-color-3" },
            { id: 14, text: "Contrôle qualité", colorClass: "step-color-3" },
            { id: 15, text: "Emballage", colorClass: "step-color-3" },
            { id: 16, text: "Transport vers un entrepôt", colorClass: "step-color-6" },
            { id: 17, text: "Transport vers un magasin", colorClass: "step-color-6" },
            { id: 18, text: "Achat", colorClass: "step-color-4" },
            { id: 19, text: "Port du vêtement", colorClass: "step-color-4" },
            { id: 20, text: "Lavage du vêtement (coût énergétique et eau)", colorClass: "step-color-4" },
            { id: 21, text: "On jette le Jeans dans une borne textile car trop usé", colorClass: "step-color-4" },
            { id: 22, text: "Transport vers centre de tri", colorClass: "step-color-6" },
            { id: 23, text: "Tri et découpage des pièces pour recycler", colorClass: "step-color-5" },
            { id: 24, text: "Recyclage ou seconde main", colorClass: "step-color-5" },
            { id: 25, text: "Stockage des déchets textiles", colorClass: "step-color-5" },
            { id: 26, text: "Incinération de matières non réutilisables", colorClass: "step-color-5" }
        ];

        // Mélanger les étapes pour le jeu
        const shuffledSteps = [...steps].sort(() => Math.random() - 0.5);

        // Afficher les étapes à trier dans la colonne de gauche
        const stepsContainer = document.getElementById('steps-container');
        const stepsColumn = document.getElementById('steps-column');

        shuffledSteps.forEach(step => {
            const stepElement = document.createElement('div');
            stepElement.className = `step ${step.colorClass}`;
            stepElement.textContent = step.text;
            stepElement.draggable = true;
            stepElement.dataset.id = step.id;
            stepElement.addEventListener('dragstart', dragStart);
            stepsContainer.appendChild(stepElement);
        });

        // Créer les emplacements numérotés dans la zone de dépôt
        const dropZone = document.getElementById('drop-zone');
        for (let i = 1; i <= 26; i++) {
            const dropSlot = document.createElement('div');
            dropSlot.className = 'drop-slot';
            dropSlot.dataset.id = i;
            dropSlot.textContent = i;
            dropSlot.addEventListener('dragover', dragOver);
            dropSlot.addEventListener('drop', drop);
            dropZone.appendChild(dropSlot);
        }

        // Rendre la colonne de gauche une zone de dépôt pour remettre les étapes
        stepsColumn.addEventListener('dragover', dragOver);
        stepsColumn.addEventListener('drop', (e) => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const draggedElement = document.querySelector(`.step[data-id="${id}"]`);
            if (draggedElement && draggedElement.parentNode !== stepsContainer) {
                draggedElement.parentNode.textContent = draggedElement.parentNode.dataset.id;
                stepsContainer.appendChild(draggedElement);
                draggedElement.style.display = 'block';
            }
        });

        // Variables pour le drag and drop
        let draggedItem = null;

        function dragStart(e) {
            draggedItem = e.target;
            e.dataTransfer.setData('text/plain', e.target.dataset.id);
            setTimeout(() => {
                e.target.style.display = 'none';
            }, 0);
        }

        function dragOver(e) {
            e.preventDefault();
            if (e.target.classList.contains('drop-slot') || e.target === stepsColumn) {
                e.target.classList.add('highlight');
            }
        }

        function drop(e) {
            e.preventDefault();
            if (e.target.classList.contains('drop-slot')) {
                e.target.classList.remove('highlight');
                const id = e.dataTransfer.getData('text/plain');
                const draggedElement = document.querySelector(`.step[data-id="${id}"]`);
                if (draggedElement) {
                    e.target.textContent = '';
                    e.target.appendChild(draggedElement);
                    draggedElement.style.display = 'block';
                }
            }
        }

        // Vérifier l'ordre
        document.getElementById('check-order').addEventListener('click', () => {
            const dropSlots = Array.from(document.querySelectorAll('.drop-slot'));
            let isCorrect = true;
            let incorrectSlots = [];

            for (let i = 0; i < dropSlots.length; i++) {
                const slot = dropSlots[i];
                const step = slot.querySelector('.step');
                if (!step || parseInt(step.dataset.id) !== i + 1) {
                    isCorrect = false;
                    incorrectSlots.push(i + 1);
                }
            }

            const feedback = document.getElementById('feedback');
            const hintBox = document.getElementById('hint-box');

            if (isCorrect) {
                feedback.textContent = "Félicitations ! Vous avez mis toutes les étapes dans le bon ordre.";
                feedback.className = "feedback correct";
                hintBox.style.display = 'none';
            } else {
                feedback.textContent = "Ce n'est pas encore le bon ordre.";
                feedback.className = "feedback incorrect";
                hintBox.style.display = 'block';
                hintBox.innerHTML = `<strong>Indice :</strong> Vérifiez les étapes ${incorrectSlots.slice(0, 3).join(', ')}...`;
            }
            feedback.style.display = 'block';
        });
    </script>
</body>
</html>
